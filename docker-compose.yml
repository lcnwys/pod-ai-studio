x-app-env: &app-env
  DATABASE_URL: postgresql://postgres:postgres@postgres:5432/pod_ai_studio?schema=public
  REDIS_URL: redis://redis:6379
  CHCYAI_BASE_URL: ${CHCYAI_BASE_URL:-https://api.chcyai.com}
  CHCYAI_ACCESS_KEY: ${CHCYAI_ACCESS_KEY:-AK_your_access_key}
  CHCYAI_SECRET_KEY: ${CHCYAI_SECRET_KEY:-SK_your_secret_key}
  CALLBACK_URL: ${CALLBACK_URL:-http://localhost:3000/api/callback}
  NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-pod-ai-studio-dev-secret-change-me}
  NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
  NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:3001}
  S3_ENDPOINT: http://minio:9000
  S3_ACCESS_KEY: minio
  S3_SECRET_KEY: minio123
  S3_BUCKET: pod-ai-studio
  S3_REGION: us-east-1

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pod_ai_studio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pod_ai_studio"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minio minio123; do sleep 2; done;
      mc mb -p local/pod-ai-studio || true;
      mc anonymous set public local/pod-ai-studio || true;
      "

  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    command: >
      /bin/sh -c "
      npm run prisma:generate &&
      npm run db:push &&
      npm run dev:web -- --hostname 0.0.0.0
      "
    ports:
      - '3000:3000'

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    command: >
      /bin/sh -c "
      npm run prisma:generate &&
      npm run db:push &&
      npm run worker
      "

  socket:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      <<: *app-env
      SOCKET_PORT: 3001
    depends_on:
      redis:
        condition: service_healthy
    command: npm run socket
    ports:
      - '3001:3001'

volumes:
  postgres_data:
  redis_data:
  minio_data:
